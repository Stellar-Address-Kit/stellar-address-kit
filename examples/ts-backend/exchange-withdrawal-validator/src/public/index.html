<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Withdrawal Validator</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; display: none; }
        #validation { margin-top: 10px; padding: 10px; display: none; }
        .validation-status { font-size: 0.85em; margin-top: 5px; min-height: 1.2em; }
        .validating { color: #666; font-style: italic; }
        .error { color: #d93025; }
        .success { color: #188038; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; font-weight: bold; margin-left: 8px; text-transform: uppercase; }
        .badge-m { background: #e8f0fe; color: #1967d2; }
        .badge-c { background: #fce8e6; color: #d93025; }
    </style>
</head>
<body>
    <h1>Exchange Withdrawal Validator</h1>
    
    <div class="form-group">
        <label for="address">Stellar Address (G..., M..., or C...)</label>
        <input type="text" id="address" placeholder="Enter Stellar address">
        <div id="validation" class="validation-status"></div>
    </div>

    <div class="form-group">
        <label for="memoType">Memo Type</label>
        <select id="memoType">
            <option value="none">None</option>
            <option value="text">TEXT</option>
            <option value="id">ID</option>
            <option value="hash">HASH</option>
            <option value="return">RETURN</option>
        </select>
    </div>

    <div class="form-group">
        <label for="memoValue">Memo Value</label>
        <input type="text" id="memoValue" placeholder="Enter memo value">
    </div>

    <button id="submit">Validate Withdrawal</button>

    <div id="validation"></div>
    <div id="result"></div>

    <script>
        const submitBtn = document.getElementById('submit');
        const addressInput = document.getElementById('address');
        const memoTypeSelect = document.getElementById('memoType');
        const memoValueInput = document.getElementById('memoValue');
        const resultDiv = document.getElementById('result');
        const validationDiv = document.getElementById('validation');

        let debounceTimer;
        let currentAbortController;

        function clearValidationState() {
            validationDiv.style.display = 'none';
            validationDiv.textContent = '';
            validationDiv.className = 'validation-status';
            memoTypeSelect.disabled = false;
            memoValueInput.disabled = false;
        }

        async function validateAddress(value) {
            if (!value) {
                clearValidationState();
                return;
            }

            // Cancel any in-flight request
            if (currentAbortController) {
                currentAbortController.abort();
            }
            currentAbortController = new AbortController();

            validationDiv.style.display = 'block';
            validationDiv.textContent = 'Validating...';
            validationDiv.className = 'validation-status validating';

            try {
                const response = await fetch('/api/validate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ address: value }),
                    signal: currentAbortController.signal,
                });

                if (!response.ok) {
                    throw new Error('Validation failed');
                }

                const result = await response.json();

                // Use server response properties instead of client-side detection
                validationDiv.className = 'validation-status';
                if (result.valid) {
                    if (result.type === 'C') {
                        validationDiv.innerHTML = '<span class="error">Contract addresses are not supported</span><span class="badge badge-c">Rejected</span>';
                        memoTypeSelect.disabled = false;
                        memoValueInput.disabled = false;
                    } else if (result.type === 'M') {
                        validationDiv.innerHTML = '<span class="success">Muxed address detected</span><span class="badge badge-m">M-Address</span>';
                        memoTypeSelect.disabled = true;
                        memoValueInput.disabled = true;
                        memoTypeSelect.value = 'none';
                        memoValueInput.value = '';
                    } else if (result.type === 'G') {
                        validationDiv.innerHTML = '<span class="success">Valid Stellar address</span>';
                        memoTypeSelect.disabled = false;
                        memoValueInput.disabled = false;
                    }
                } else {
                    validationDiv.innerHTML = '<span class="error">Invalid address format</span>';
                    memoTypeSelect.disabled = false;
                    memoValueInput.disabled = false;
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    return; // Request was cancelled
                }
                validationDiv.innerHTML = '<span class="error">Validation failed</span>';
                validationDiv.className = 'validation-status error';
                memoTypeSelect.disabled = false;
                memoValueInput.disabled = false;
            }
        }

        addressInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const value = addressInput.value.trim();
            if (!value) {
                clearValidationState();
                return;
            }
            debounceTimer = setTimeout(() => {
                validateAddress(value);
            }, 300);
        });

        addressInput.addEventListener('paste', (e) => {
            clearTimeout(debounceTimer);
            // Use the pasted data directly from clipboard
            const pastedData = (e.clipboardData || window.clipboardData).getData('text').trim();
            validateAddress(pastedData);
        });

        submitBtn.addEventListener('click', async () => {
            const data = {
                address: addressInput.value,
                memoType: memoTypeSelect.value,
                memoValue: memoValueInput.value
            };

            resultDiv.style.display = 'block';
            resultDiv.textContent = 'Submission received for: ' + data.address;
        });
    </script>
</body>
</html>
